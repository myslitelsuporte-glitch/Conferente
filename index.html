<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conferente</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#0f1115;--card:#171a21;--line:#262b36;--txt:#e8eaed;--dim:#9aa3b2;--ac:#4f8cff}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font:16px/1.5 -apple-system,Roboto,sans-serif;padding:20px 16px 60px;max-width:640px;margin-inline:auto}
h1{font-size:20px;margin:0 0 4px}
.sub{color:var(--dim);font-size:13px;margin-bottom:22px}
label{display:block;font-size:13px;color:var(--dim);margin:16px 0 6px}
input,textarea{width:100%;background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:12px;font:inherit;font-size:15px}
textarea{min-height:120px}
button{width:100%;margin-top:10px;padding:14px;border:0;border-radius:10px;background:var(--ac);color:#fff;font:inherit;font-weight:600;font-size:16px}
.b2{background:#2a2f3a}
#bug{background:#5c1a1a;color:#fff;padding:10px;font-size:13px;display:none;border-radius:8px;margin-bottom:14px}
.dica{color:var(--dim);font-size:12px;margin-top:18px}
</style>
</head>
<body>
<div id="bug"></div>
<h1>Conferente</h1>
<div class="sub">Cole um comentário e escolha onde conferir.</div>

<label for="c">Comentário</label>
<textarea id="c" placeholder="Cole aqui o comentário do TikTok ou do X"></textarea>

<label for="p">Sua pergunta (opcional)</label>
<input id="p" placeholder="isso é verdade?">

<button onclick="abrir('google')">Conferir no Google</button>
<button class="b2" onclick="abrir('perplexity')">Conferir no Perplexity</button>
<button class="b2" onclick="abrir('chatgpt')">Conferir no ChatGPT</button>

<div class="dica">Abre a IA com o pedido já pronto. Sem cadastro, sem limite.</div>

<script>
window.onerror = function(m, f, l){
  var b = document.getElementById("bug");
  b.style.display = "block";
  b.textContent = "Erro na linha " + l + ": " + m;
};

function montar(){
  var c = document.getElementById("c").value.trim();
  var p = document.getElementById("p").value.trim();
  if(!c){ alert("Cole um comentário primeiro."); return null; }
  var hoje = new Date().toLocaleDateString("pt-BR");
  var t = "Hoje é " + hoje + ". Verifique este comentário: \"" + c + "\"";
  if(p){ t += " Pergunta: " + p; }
  t += " Responda em até 60 palavras. Separe o que é fato verificável do que é opinião ou relação de causa disputada.";
  t += " Busque o dado atual em fonte oficial (IBGE, Banco Central, IPEA, TSE, gov.br) ou imprensa de grande circulação;";
  t += " não use sites de partidos, de militância, blogs ou Wikipédia.";
  t += " Todo número com o período a que se refere. Não diga se a pessoa está certa ou errada.";
  return t;
}

function abrir(onde){
  var t = montar();
  if(!t) return;
  var q = encodeURIComponent(t);
  var url;
  if(onde === "google"){ url = "https://www.google.com/search?udm=50&q=" + q; }
  if(onde === "perplexity"){ url = "https://www.perplexity.ai/search?q=" + q; }
  if(onde === "chatgpt"){ url = "https://chatgpt.com/?q=" + q; }
  window.open(url, "_blank");
}

var par = new URLSearchParams(location.search);
var recebido = par.get("text") || par.get("url") || "";
if(recebido){ document.getElementById("c").value = recebido; }
</script>
</body>
</html>
